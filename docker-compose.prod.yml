name: payoes-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: payoes-prod-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payoes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-payoes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payoes} -d ${POSTGRES_DB:-payoes}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: payoes-prod-web-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-payoes}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payoes}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER:-payoes}

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-https://docs.payoes.com}
        NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL:-https://github.com/yazidalg/payoes}
    container_name: payoes-prod-web
    restart: always
    ports:
      - "${NEXTJS_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      web-migrate:
        condition: service_completed_successfully
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-payoes}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payoes}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
