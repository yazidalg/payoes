# API only. PostgreSQL and S3/R2 are configured in apps/api/.env.
services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: payoes-api
    restart: unless-stopped
    ports:
      - "${PAYOES_API_PORT:-8088}:8080"
    env_file:
      - path: ./apps/api/.env
        required: false
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
