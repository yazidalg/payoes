services:
  postgres:
    image: postgres:17-alpine
    container_name: payoes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payoes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payoes}
      POSTGRES_DB: ${POSTGRES_DB:-payoes}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payoes} -d ${POSTGRES_DB:-payoes}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: payoes-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: payoes
      MINIO_ROOT_PASSWORD: payoessecret
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: payoes-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 payoes payoessecret; do sleep 1; done;
      mc mb local/payoes-uploads --ignore-existing;
      mc anonymous set download local/payoes-uploads;
      echo 'MinIO bucket payoes-uploads is ready';
      "

  web-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: payoes-web-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-payoes}:${POSTGRES_PASSWORD:-payoes}@postgres:5432/${POSTGRES_DB:-payoes}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER:-payoes}

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-http://localhost:3001}
        NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL:-https://github.com/yazidalg/payoes}
    container_name: payoes-web
    restart: unless-stopped
    ports:
      - "${NEXTJS_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      web-migrate:
        condition: service_completed_successfully
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-payoes-docker-dev-secret}
      DATABASE_URL: postgresql://${POSTGRES_USER:-payoes}:${POSTGRES_PASSWORD:-payoes}@postgres:5432/${POSTGRES_DB:-payoes}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/payoes-uploads}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  minio_data:
