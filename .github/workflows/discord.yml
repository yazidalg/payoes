name: Notify Discord

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check environment file changes
        id: envcheck
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          ENV_CHANGED="false"

          while read file; do
            if [[ "$file" =~ ^\.env ]] || [[ "$file" =~ \.env$ ]] || [[ "$file" == ".env.example" ]] || [[ "$file" == ".env.production" ]] || [[ "$file" == ".env.development" ]] || [[ "$file" == ".env.local" ]]; then
              ENV_CHANGED="true"
            fi
          done <<< "$CHANGED"

          echo "changed=$ENV_CHANGED" >> $GITHUB_OUTPUT

      - name: Send Discord Notification
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          AUTHOR: ${{ github.actor }}
          MESSAGE: ${{ github.event.head_commit.message }}
          URL: ${{ github.event.head_commit.url }}
          ENV_CHANGED: ${{ steps.envcheck.outputs.changed }}
        run: |
          if [ "$ENV_CHANGED" = "true" ]; then
            ENV_STATUS="⚠️ .env.example has been updated. Please sync your environment variables."
          else
            ENV_STATUS="✅ No environment changes."
          fi

          jq -n \
            --arg content "New commit pushed to main

Repository: $REPO
Author: $AUTHOR
Message: $MESSAGE

Commit:
<$URL>

Environment
$ENV_STATUS" \
      '{content: $content}' > payload.json

    curl \
      -H "Content-Type: application/json" \
      -X POST \
      -d @payload.json \
      "$WEBHOOK"
          if [ "$ENV_CHANGED" = "true" ]; then
            ENV_TEXT="⚠️ Environment file changed!"
          else
            ENV_TEXT="✅ No environment changes."
          fi

          cat <<EOF > payload.json
          {
            "embeds": [
              {
                "title": "🚀 New Push to main",
                "color": 5814783,
                "fields": [
                  {
                    "name": "Repository",
                    "value": "$REPO",
                    "inline": true
                  },
                  {
                    "name": "Author",
                    "value": "$AUTHOR",
                    "inline": true
                  },
                  {
                    "name": "Commit",
                    "value": "\`${SHA:0:7}\`",
                    "inline": true
                  },
                  {
                    "name": "Message",
                    "value": "$MESSAGE"
                  },
                  {
                    "name": "Environment",
                    "value": "$ENV_TEXT"
                  }
                ],
                "url": "$URL",
                "footer": {
                  "text": "GitHub Actions"
                },
                "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              }
            ]
          }
          EOF

          curl \
            -H "Content-Type: application/json" \
            -X POST \
            -d @payload.json \
            "$WEBHOOK"
