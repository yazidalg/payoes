- name: Send Discord Notification
  env:
    WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    REPO: ${{ github.repository }}
    AUTHOR: ${{ github.actor }}
    MESSAGE: ${{ github.event.head_commit.message }}
    URL: ${{ github.event.head_commit.url }}
    ENV_CHANGED: ${{ steps.envcheck.outputs.changed }}
  run: |
    if [ "$ENV_CHANGED" = "true" ]; then
      ENV_STATUS="⚠️ .env.example has been updated. Please sync your environment variables."
    else
      ENV_STATUS="✅ No environment changes."
    fi

    jq -n \
      --arg content "New commit pushed to main

Repository: $REPO
Author: $AUTHOR
Message: $MESSAGE

Commit:
<$URL>

Environment
$ENV_STATUS" \
      '{content: $content}' > payload.json

    curl \
      -H "Content-Type: application/json" \
      -X POST \
      -d @payload.json \
      "$WEBHOOK"